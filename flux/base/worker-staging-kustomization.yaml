---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: worker-staging
  namespace: flux-system
spec:
  dependsOn:
  - name: redis-staging
  interval: 1h
  path: ./deploy/worker/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: instavote
  targetNamespace: instavote
